
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    sendfile on;

    server {
        listen 443 ssl;
        server_name free-porn-block.tech www.free-porn-block.tech;

        ssl_certificate /etc/letsencrypt/live/free-porn-block.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/free-porn-block.tech/privkey.pem;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass https://hdmd:8443;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
