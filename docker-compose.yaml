services:
  hmdm-nginx-http:
    image: nginx:latest
    container_name: hmdm-nginx-http
    ports:
      - "80:80"
    volumes:
      - ./nginx/http/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot

  nginx-https:
    image: nginx:latest
    container_name: hmdm-nginx-https
    ports:
      - "443:443"
    depends_on:
      - hmdm-nginx-http
    volumes:
      - ./nginx/https/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./volumes/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
  
  certbot:
    image: certbot/certbot:v1.4.0
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./volumes/letsencrypt:/etc/letsencrypt
    depends_on:
      - hmdm-nginx-http
    entrypoint: "certbot certonly --non-interactive --agree-tos -m ${ADMIN_EMAIL} --webroot -w /var/www/certbot -d ${BASE_DOMAIN}"

  postgresql:
    image: postgres:12-alpine
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${SQL_USER}
      POSTGRES_PASSWORD: ${SQL_PASS}
      POSTGRES_DB: ${SQL_BASE}
    volumes: 
      - ./volumes/db:/var/lib/postgresql/data

  hmdm:
    image: headwindmdm/hmdm:0.1.8
    container_name: hmdm
    ports:
      - 443:8443
      - 31000:31000
    volumes:
      - ./volumes/work:/usr/local/tomcat/work
      - ./volumes/letsencrypt:/etc/letsencrypt
      - ./volumes/hmdm-config:/usr/local/tomcat/conf/Catalina/localhost
      - ./volumes/webapps:/usr/local/tomcat/webapps
    depends_on:
      - certbot
      - hmdm-nginx-http
      - hmdm-nginx-https
    environment:
      SQL_HOST: postgresql
      SQL_USER: ${SQL_USER}
      SQL_BASE: ${SQL_BASE}
      SQL_PASS: ${SQL_PASS}
      BASE_DOMAIN: ${BASE_DOMAIN}
      LOCAL_IP: ${LOCAL_IP}
      PROTOCOL: ${PROTOCOL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      SHARED_SECRET: ${SHARED_SECRET}
      HMDM_VARIANT: ${HMDM_VARIANT}
      DOWNLOAD_CREDENTIALS: ${DOWNLOAD_CREDENTIALS}
      HMDM_URL: ${HMDM_URL}
      CLIENT_VERSION: ${CLIENT_VERSION}
      FORCE_RECONFIGURE: ${FORCE_RECONFIGURE}

